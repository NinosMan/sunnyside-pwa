<html lang="en">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SunnySide</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- App Icon for iOS/Android -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏖️</text></svg>">
    <link rel="apple-touch-icon" href="https://abs.twimg.com/emoji/v2/72x72/1f3d6.png">

    <style>
        :root {
            --sand: #FFF8E7;
            --sand-dark: #EDD4B2;
            --ocean: #4FB0C6;
            --ocean-dark: #007EA7;
            --sun: #FFD93D;
            --text: #4A4A4A;
            --card-bg: #ffffff;
            --danger: #FF6B6B;
            --success: #6BCB77;
            --warning: #F7B731;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--sand);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Prevent pull-to-refresh on mobile to feel like app */
            overscroll-behavior-y: none;
        }

        /* --- Fun Header --- */
        header {
            text-align: center;
            padding: 20px 20px 10px 20px;
            width: 100%;
            background: linear-gradient(180deg, #A8E6CF 0%, rgba(168, 230, 207, 0) 100%);
            /* Safe area for phones with notches */
            padding-top: env(safe-area-inset-top); 
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            font-size: 2.5rem;
            color: var(--ocean-dark);
            letter-spacing: 1px;
        }
        
        p.subtitle { margin: 5px 0 0; color: #666; font-weight: 700; }

        /* --- Search Box --- */
        #controls {
            background: #fff;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 8px 0px rgba(0,0,0,0.05);
            width: 85%;
            max-width: 500px;
            margin-bottom: 20px;
            border: 3px solid var(--sand-dark);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group { display: flex; gap: 10px; }

        input[type="text"] {
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 1rem;
            width: 100%;
            outline: none;
            font-family: 'Nunito', sans-serif;
            transition: border 0.2s;
            /* Better mobile typing */
            -webkit-appearance: none;
        }
        input[type="text"]:focus { border-color: var(--ocean); }

        button {
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.1s, filter 0.2s;
            /* Prevent text selection */
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: translateY(3px); }

        .btn-search { background: var(--ocean); color: white; width: 100%; }
        .btn-gps { background: var(--sun); color: #7a6000; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; }

        /* --- Results List --- */
        #results {
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 80px; /* Extra padding for bottom scrolling */
        }

        /* --- The Card --- */
        .beach-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 6px 0px rgba(0,0,0,0.05);
            border: 2px solid #fff;
            overflow: hidden;
            transition: transform 0.1s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .beach-card:active { transform: scale(0.99); }

        .card-summary { padding: 20px; position: relative; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .beach-name { 
            margin: 0; font-size: 1.3rem; color: var(--ocean-dark); font-family: 'Fredoka', sans-serif;
            line-height: 1.2; padding-right: 10px;
        }
        
        .dist-tag { font-size: 0.8rem; color: #999; font-weight: 700; display: block; margin-top: 4px; }
        .wind-badge { padding: 6px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 800; color: white; white-space: nowrap; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }

        /* Stats Grid */
        .stats-grid { display: flex; gap: 10px; margin-top: 15px; }
        .stat-box { background: #F8F9FA; padding: 10px; border-radius: 12px; flex: 1; text-align: center; border: 1px solid #eee; }
        .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--text); display: block; }
        .stat-lbl { font-size: 0.7rem; color: #aaa; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

        .expand-hint { text-align: center; color: var(--ocean); font-size: 1.2rem; margin-top: 10px; transition: transform 0.3s; }
        .expanded .expand-hint { transform: rotate(180deg); }

        /* Map Container */
        .map-wrapper { height: 0; transition: height 0.4s cubic-bezier(0.25, 1, 0.5, 1); position: relative; background: #E0E0E0; }
        .map-frame { width: 100%; height: 100%; }
        .leaflet-tile-pane { filter: sepia(0.1) contrast(1.05) saturate(1.2); }

        .go-btn { position: absolute; bottom: 15px; right: 15px; background: var(--ocean); color: white; text-decoration: none; padding: 10px 20px; border-radius: 25px; font-weight: 800; font-size: 0.9rem; box-shadow: 0 4px 0 rgba(0,0,0,0.2); z-index: 1000; }

        #status { font-weight: 700; color: #666; margin-bottom: 10px; min-height: 24px; text-align: center; }
        .loader { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #665c33; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>🏖️ SunnySide</h1>
        <p class="subtitle">Tap a card to find shelter</p>
    </header>

    <div id="controls">
        <div class="input-group">
            <input type="text" id="cityInput" placeholder="Enter City (e.g. Honolulu)" onkeydown="if(event.key === 'Enter') searchByAddress()">
            <button class="btn-search" id="searchBtn" onclick="searchByAddress()">Go</button>
        </div>
        <button class="btn-gps" id="gpsBtn" onclick="searchByGPS()">
            <span>📍 Find Near Me</span>
            <div class="loader" id="loader"></div>
        </button>
    </div>

    <div id="status"></div>
    <div id="results"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const SEARCH_RADIUS = 25000;
        const MAX_RESULTS = 12;
        let maps = {}; 
        let currentOpenIndex = -1;

        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');
        const loader = document.getElementById('loader');

        async function searchByAddress() {
            const query = document.getElementById('cityInput').value.trim();
            if(!query) return;
            setLoading(true);
            statusEl.textContent = "Looking at the map...";
            try {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;
                const res = await fetch(url);
                const data = await res.json();
                if(data.length) findBeaches(data[0].lat, data[0].lon, data[0].display_name.split(',')[0]);
                else showError("Hmm, can't find that place.");
            } catch(e) { showError("Connection failed."); }
        }

        function searchByGPS() {
            setLoading(true);
            statusEl.textContent = "Checking GPS...";
            if(!navigator.geolocation) { showError("GPS not supported."); return; }
            navigator.geolocation.getCurrentPosition(
                pos => findBeaches(pos.coords.latitude, pos.coords.longitude, "your spot"),
                err => showError("GPS denied. Try searching.")
            );
        }

        async function findBeaches(lat, lng, locName) {
            statusEl.textContent = `Scanning coast near ${locName}...`;
            const query = `[out:json][timeout:25];(node["natural"="beach"](around:${SEARCH_RADIUS},${lat},${lng});way["natural"="beach"](around:${SEARCH_RADIUS},${lat},${lng});relation["natural"="beach"](around:${SEARCH_RADIUS},${lat},${lng}););out center ${MAX_RESULTS};`;
            
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                if(!data.elements.length) { showError("No beaches found nearby."); return; }
                
                statusEl.textContent = "Checking wind conditions...";
                const promises = data.elements.map(async el => {
                    const bLat = el.lat || el.center.lat;
                    const bLng = el.lon || el.center.lon;
                    const w = await getWeather(bLat, bLng);
                    const dist = getDist(lat, lng, bLat, bLng);
                    return {
                        name: el.tags.name || "Secret Beach",
                        lat: bLat, lng: bLng, dist: dist,
                        wind: w.wind_speed, dir: w.wind_direction, temp: w.temperature
                    };
                });

                const results = await Promise.all(promises);
                const valid = results
                    .filter(r => r.wind !== 999)
                    .sort((a, b) => {
                        if (a.wind !== b.wind) return a.wind - b.wind;
                        return parseFloat(a.dist) - parseFloat(b.dist);
                    });
                
                renderResults(valid);
                statusEl.textContent = "";
                setLoading(false);

            } catch(e) { console.error(e); showError("Map service busy."); }
        }

        async function getWeather(lat, lng) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
                const d = await res.json();
                return { temperature: Math.round(d.current_weather.temperature), wind_speed: d.current_weather.windspeed, wind_direction: d.current_weather.winddirection };
            } catch { return { wind_speed: 999 }; }
        }

        function renderResults(beaches) {
            resultsEl.innerHTML = "";
            maps = {};
            currentOpenIndex = -1;

            beaches.forEach((b, idx) => {
                const el = document.createElement('div');
                el.className = 'beach-card';
                el.id = `card-${idx}`;
                let badgeColor = b.wind < 15 ? 'var(--success)' : (b.wind < 25 ? 'var(--warning)' : 'var(--danger)');
                let badgeText = b.wind < 15 ? 'Calm' : (b.wind < 25 ? 'Breezy' : 'Windy');

                el.innerHTML = `
                    <div class="card-summary">
                        <div class="header-row">
                            <div><h2 class="beach-name">${b.name}</h2><span class="dist-tag">🚗 ${b.dist} km away</span></div>
                            <span class="wind-badge" style="background:${badgeColor}">${badgeText}</span>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box"><span class="stat-val">${b.wind}</span><span class="stat-lbl">km/h</span></div>
                            <div class="stat-box"><span class="stat-val">${b.temp}°</span><span class="stat-lbl">Temp</span></div>
                             <div class="stat-box"><span class="stat-val" style="transform:rotate(${b.dir + 180}deg); display:inline-block">⬇</span><span class="stat-lbl">Wind Dir</span></div>
                        </div>
                        <div class="expand-hint">▼</div>
                    </div>
                    <div id="map-wrapper-${idx}" class="map-wrapper">
                        <div class="map-frame" id="map-frame-${idx}"></div>
                        <a href="https://www.google.com/maps/search/?api=1&query=${b.lat},${b.lng}" target="_blank" class="go-btn">Go in Maps</a>
                    </div>
                `;
                el.onclick = (e) => {
                    if(e.target.classList.contains('go-btn')) return;
                    toggleCard(idx, b.lat, b.lng, b.dir);
                };
                resultsEl.appendChild(el);
            });
        }

        function toggleCard(index, lat, lng, windDir) {
            if (currentOpenIndex === index) { closeCard(index); currentOpenIndex = -1; return; }
            if (currentOpenIndex !== -1) closeCard(currentOpenIndex);
            openCard(index, lat, lng, windDir);
            currentOpenIndex = index;
        }

        function closeCard(index) {
            document.getElementById(`map-wrapper-${index}`).style.height = '0';
            document.getElementById(`card-${index}`).classList.remove('expanded');
        }

        function openCard(index, lat, lng, windDir) {
            const wrapper = document.getElementById(`map-wrapper-${index}`);
            const card = document.getElementById(`card-${index}`);
            card.classList.add('expanded');
            wrapper.style.height = '350px';

            if (!maps[index]) {
                setTimeout(() => {
                    const map = L.map(`map-frame-${index}`, { zoomControl: false, attributionControl: false, scrollWheelZoom: false }).setView([lat, lng], 14);
                    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);
                    const beachIcon = L.divIcon({ html: '<div style="font-size:30px;">🏖️</div>', className: 'dummy', iconSize: [30, 30], iconAnchor: [15, 15] });
                    L.marker([lat, lng], {icon: beachIcon}).addTo(map);
                    const arrowHtml = `<div style="transform: rotate(${windDir + 180}deg); font-size: 50px; color: #FF6B6B; text-shadow: 2px 2px 0 #fff; width: 60px; height: 60px; text-align:center; line-height:60px;">⬇</div>`;
                    const windIcon = L.divIcon({ html: arrowHtml, className: '', iconSize: [60, 60], iconAnchor: [30, 30] });
                    L.marker([lat, lng], {icon: windIcon, zIndexOffset: 100}).addTo(map);
                    map.invalidateSize();
                    maps[index] = map;
                }, 100);
            }
        }

        function setLoading(bool) { loader.style.display = bool ? 'block' : 'none'; document.getElementById('searchBtn').disabled = bool; if(bool) resultsEl.innerHTML = ''; }
        function showError(msg) { statusEl.textContent = msg; setLoading(false); }
        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
        }
    </script>
</body>
</html>
